# Brand accent — single source of truth.
#
# Only the M3 `primary` role is centralised here, because it is the one value
# the Liquid (head.html) and Sass pipelines must agree on. Both pipelines read
# it so they can never drift:
#   - assets/css/main.scss injects it into the Sass mode modules
#     (@use "0-settings/light-mode" with ($primary: ...)), which is how the CSS
#     --color-primary token gets its value.
#   - _includes/head.html renders it into <meta name="theme-color"> (and the
#     data-theme-color-* attributes the theme JS reads) so the browser chrome
#     colour tracks the palette automatically. theme-color is a single colour,
#     so secondary/tertiary have no place here.
#
# Everything else (secondary, tertiary, every other M3 + syntax token per mode)
# lives directly in _sass/0-settings/_light-mode.scss and _dark-mode.scss.
#
# To re-brand the template, change these two values. Keep each equal to the
# matching mode file's $primary fallback (a checked-in guard enforces this —
# see scripts/check-color-contract.rb).

primary_light: "#7E4D7C"   # aubergine glaze — light-mode brand
primary_dark:  "#EFB4E9"   # lifted aubergine (orchid) — dark-mode brand
