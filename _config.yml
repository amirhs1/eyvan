# Jekyll site configuration for a minimal professional portfolio.

# ------------------------------------------------------------
# Site identity
# Core site-level metadata used in titles, SEO, feeds, and templates.
# ------------------------------------------------------------
title: "Your Name"
description: "A clean, modern portfolio site for projects, writing, and professional information."
lang: "en"
# Feed-compatible author metadata. `jekyll-feed` reads `site.author`
# from `_config.yml`; theme UI reads `_data/author.yml`. Keep both
# places aligned when customizing the template identity.
author:
  name: "Your Name"
  email: "hello@example.com"
  uri: "https://example.com"
# `url` + `baseurl` build the absolute links used in canonical tags, Open Graph /
# Twitter previews, the sitemap, and the RSS feed. The values below point at the
# Eyvan demo site.
# IMPORTANT: change both to your own after creating a site from this template,
# otherwise those links will keep pointing at the demo. See "Deployment" in README.md.
url: "https://amirhs1.github.io"
baseurl: "/eyvan"
default_og_image: "assets/images/og-default.webp"

# ------------------------------------------------------------
# Brand assets and global links
# Reusable site-wide assets and URLs referenced in templates.
# ------------------------------------------------------------
logo: "assets/images/logo.svg"
cv_url: "assets/files/resume.pdf"

# ------------------------------------------------------------
# URL structure
# Defines how project pages appear in the final site URLs.
# ------------------------------------------------------------
permalink: /projects/:title/

# ------------------------------------------------------------
# Build and markdown settings
# Core Jekyll behavior for rendering pages and content.
# ------------------------------------------------------------
dev_only: false # set true to show the dev-debug window and include the /tests pages
markdown: kramdown
highlighter: rouge

kramdown:
  auto_ids: true
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge

# ------------------------------------------------------------
# Plugins
# Keep this list small and practical for a portfolio site.
# ------------------------------------------------------------
plugins:
  - jekyll-sitemap
  - jekyll/tagging
  - jekyll-feed

# ------------------------------------------------------------
# Default front matter values
# Applied automatically when matching the given scope.
# ------------------------------------------------------------
defaults:
  - scope:
      path: ""
    values:
      layout: default

  - scope:
      type: posts
    values:
      layout: post
      share: true

  - scope:
      path: "assets/files/resume.pdf"
    values:
      sitemap: false

# ------------------------------------------------------------
# Tag pages
# Configuration for generated tag archive pages.
# ------------------------------------------------------------
tag_page_dir: "tag"
tag_page_layout: "tag-page"
tag_permalink_style: "pretty"

# ------------------------------------------------------------
# Sass / SCSS
# Tells Jekyll where Sass lives and how to output CSS.
# ------------------------------------------------------------
sass:
  sass_dir: _sass
  style: compressed
  sourcemap: never

# ------------------------------------------------------------
# Global feature flags
# Simple toggles used by templates and layouts.
# ------------------------------------------------------------
words_per_minute: 238
read_time: true

# ------------------------------------------------------------
# Analytics
# Leave blank (or omit) to disable Google Analytics entirely.
# Set to your Measurement ID (e.g. "G-XXXXXXXXXX") to enable.
# ------------------------------------------------------------
google_analytics: ""

# ------------------------------------------------------------
# Files and folders to exclude from the build
# Prevents non-site assets and tooling files from being processed.
# ------------------------------------------------------------
exclude:
  - ACCESSIBILITY_TESTING.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - SECURITY.md
  - node_modules
  - vendor
  - vendor/bundle
  - vendor/cache
  - vendor/gems
  - vendor/ruby
  - README.md
  - RELEASE_CHECKLIST.md
  - THIRD_PARTY_NOTICES.md
  - notes
  - scripts
  - package.json
  - package-lock.json
  - eyvan.gemspec
  - tests
  - test-results
  - playwright-report
  - playwright.config.js
  - AUDIT_REPORT.md
  - CLAUDE.md
  - AGENTS.md
